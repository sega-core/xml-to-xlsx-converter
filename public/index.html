<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML в XLSX конвертер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f2ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .upload-text {
            color: #666;
            font-size: 16px;
        }

        .upload-text strong {
            color: #667eea;
            cursor: pointer;
        }

        .upload-info {
            color: #999;
            font-size: 14px;
            margin-top: 10px;
        }

        #fileInput {
            display: none;
        }

        #fileName {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
            color: #333;
            font-weight: 500;
        }

        .convert-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .convert-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .convert-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .file-preview {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .file-preview .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-preview .file-size {
            color: #666;
            font-size: 14px;
        }

        .remove-file {
            margin-left: auto;
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .remove-file:hover {
            background: #c82333;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .upload-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="upload-area" id="uploadArea">
            <span class="upload-icon">📁</span>
            <div class="upload-text">
                Перетащите файл сюда или <strong>выберите файл</strong>
            </div>
            <div class="upload-info">Поддерживаются только XML файлы (до 10MB)</div>
            <input type="file" id="fileInput" accept=".xml">
        </div>

        <div id="fileName"></div>

        <div class="file-preview" id="filePreview">
            <div class="file-info">
                <span>📄 <span id="previewFileName"></span></span>
                <span class="file-size" id="previewFileSize"></span>
                <button class="remove-file" id="removeFile">✕</button>
            </div>
        </div>

        <button class="convert-btn" id="convertBtn" disabled>Конвертировать в XLSX</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Конвертация...</p>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const convertBtn = document.getElementById('convertBtn');
            const fileName = document.getElementById('fileName');
            const filePreview = document.getElementById('filePreview');
            const previewFileName = document.getElementById('previewFileName');
            const previewFileSize = document.getElementById('previewFileSize');
            const removeFileBtn = document.getElementById('removeFile');
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');

            let selectedFile = null;

            // Клик по области загрузки
            uploadArea.addEventListener('click', () => {
                fileInput.click();
            });

            // Drag and drop
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });

            // Выбор файла
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFile(e.target.files[0]);
                }
            });

            // Обработка файла
            function handleFile(file) {
                const validTypes = ['text/xml', 'application/xml'];
                const ext = file.name.split('.').pop().toLowerCase();
                
                if (ext !== 'xml' && !validTypes.includes(file.type)) {
                    showMessage('Пожалуйста, выберите XML файл', 'error');
                    return;
                }

                if (file.size > 10 * 1024 * 1024) {
                    showMessage('Файл слишком большой (максимум 10MB)', 'error');
                    return;
                }

                selectedFile = file;
                previewFileName.textContent = file.name;
                previewFileSize.textContent = `(${(file.size / 1024).toFixed(1)} KB)`;
                filePreview.style.display = 'block';
                fileName.style.display = 'none';
                convertBtn.disabled = false;
                hideMessage();
            }

            // Удаление файла
            removeFileBtn.addEventListener('click', () => {
                selectedFile = null;
                filePreview.style.display = 'none';
                fileInput.value = '';
                convertBtn.disabled = true;
                hideMessage();
            });

            // Конвертация
            convertBtn.addEventListener('click', async () => {
                if (!selectedFile) return;

                const formData = new FormData();
                formData.append('xmlFile', selectedFile);

                convertBtn.disabled = true;
                loading.style.display = 'block';
                hideMessage();

                try {
                    const response = await fetch('/convert', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error || 'Ошибка конвертации');
                    }

                    // Скачиваем файл
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const originalName = selectedFile.name.replace('.xml', '');
                    a.download = `${originalName}-${Date.now()}.xlsx`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);

                    showMessage('✅ Конвертация успешно завершена! Файл скачан.', 'success');
                    
                    // Очищаем после успешной конвертации
                    setTimeout(() => {
                        selectedFile = null;
                        filePreview.style.display = 'none';
                        fileInput.value = '';
                        convertBtn.disabled = true;
                    }, 3000);

                } catch (error) {
                    showMessage(`❌ Ошибка: ${error.message}`, 'error');
                } finally {
                    loading.style.display = 'none';
                    convertBtn.disabled = false;
                }
            });

            // Вспомогательные функции
            function showMessage(text, type) {
                message.textContent = text;
                message.className = `message ${type}`;
            }

            function hideMessage() {
                message.className = 'message';
                message.textContent = '';
            }
        });
    </script>
</body>
</html>
