services:
  xml-converter:
    build: .
    container_name: xml-to-xlsx-converter
    restart: always
    ports:
      - "3002:3002"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3002
    # Запускаем от root внутри контейнера для доступа к файлам
    user: "0:0"